name: Bug report
description: Report a reproducible bug in exporter behavior, CLI, or docs.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Brief bug summary
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact commands and sequence.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the full command.
      placeholder: flouds-export export --model-name ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste traceback or terminal output.
      render: shell
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 14
    validations:
      required: true
